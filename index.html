<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>حوكشه STORE | Premium Study Books</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;700;900&display=swap" rel="stylesheet">
    
    <style>
        /* ========================
           CSS VARIABLES & RESET
           ======================== */
        :root {
            --black: #000000;
            --white: #ffffff;
            --glass-bg: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
            --glow: 0 0 20px rgba(255, 255, 255, 0.15);
            --transition: all 0.4s cubic-bezier(0.25, 0.8, 0.25, 1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Cairo', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--black);
            color: var(--white);
            overflow-x: hidden;
            min-height: 100vh;
        }

        /* ========================
           BACKGROUND VIDEO & OVERLAY
           ======================== */
        .video-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -2;
            overflow: hidden;
        }

        #bg-video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            opacity: 1; /* لزيادة إضاءة الخلفية كما طلبت */
        }

        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle, rgba(0,0,0,0.4) 0%, rgba(0,0,0,0.85) 100%);
            z-index: -1;
            pointer-events: none;
        }

        /* ========================
           INTRO SCREEN
           ======================== */
        #intro-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100vh;
            background-color: var(--black);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            transition: opacity 1s ease-in-out, visibility 1s ease-in-out;
        }

        .intro-logo {
            width: 180px;
            height: auto;
            animation: rotate3D 8s linear infinite, float 4s ease-in-out infinite;
            filter: drop-shadow(0 0 15px rgba(255,255,255,0.3));
        }

        .intro-text {
            margin-top: 30px;
            text-align: center;
        }

        .intro-title {
            font-size: 2.5rem;
            font-weight: 900;
            letter-spacing: 2px;
            margin-bottom: 10px;
        }

        .intro-subtitle {
            font-size: 1.1rem;
            font-weight: 300;
            opacity: 0.8;
            letter-spacing: 1px;
        }

        .enter-btn {
            margin-top: 40px;
            padding: 12px 35px;
            background: transparent;
            color: var(--white);
            border: 1px solid var(--white);
            border-radius: 30px;
            font-size: 1.1rem;
            cursor: pointer;
            transition: var(--transition);
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .enter-btn:hover {
            background: var(--white);
            color: var(--black);
            box-shadow: var(--glow);
        }

        /* ========================
           HEADER & NAVIGATION
           ======================== */
        header {
            position: fixed;
            top: 0;
            width: 100%;
            padding: 20px 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 100;
            transition: var(--transition);
        }

        header.scrolled {
            padding: 10px 5%;
            background: var(--glass-bg);
            backdrop-filter: blur(15px);
            border-bottom: 1px solid var(--glass-border);
        }

        .header-logo {
            width: 100px;
            transition: var(--transition);
            cursor: pointer;
        }

        header.scrolled .header-logo {
            width: 70px;
        }

        .cart-icon {
            position: relative;
            cursor: pointer;
            font-size: 1.5rem;
            display: flex;
            align-items: center;
        }

        .cart-count {
            position: absolute;
            top: -8px;
            right: -10px;
            background: var(--white);
            color: var(--black);
            font-size: 0.7rem;
            font-weight: bold;
            width: 20px;
            height: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            border-radius: 50%;
        }

        /* ========================
           MAIN APP CONTAINER
           ======================== */
        #app-content {
            opacity: 0;
            visibility: hidden;
            transition: opacity 1s ease-in-out;
            padding-top: 100px;
            min-height: 100vh;
        }

        #app-content.active {
            opacity: 1;
            visibility: visible;
        }

        /* ========================
           PRODUCT GRID (HOME)
           ======================== */
        .container {
            width: 90%;
            max-width: 1200px;
            margin: 0 auto;
            padding: 40px 0;
        }

        .section-title {
            font-size: 2rem;
            font-weight: 300;
            margin-bottom: 40px;
            text-align: center;
            letter-spacing: 2px;
        }

        .product-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 30px;
        }

        .product-card {
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: 15px;
            padding: 20px;
            text-align: center;
            cursor: pointer;
            backdrop-filter: blur(10px);
            transition: var(--transition);
            animation: float 6s ease-in-out infinite;
            animation-delay: calc(var(--delay) * 0.2s);
        }

        .product-card:hover {
            transform: translateY(-10px) scale(1.02);
            box-shadow: 0 15px 35px rgba(255, 255, 255, 0.1);
            border-color: rgba(255,255,255,0.3);
        }

        .product-img {
            width: 100%;
            height: 250px;
            object-fit: contain;
            margin-bottom: 20px;
            transition: var(--transition);
            filter: drop-shadow(0 10px 10px rgba(0,0,0,0.5));
        }

        .product-card:hover .product-img {
            transform: scale(1.08);
            filter: drop-shadow(0 0 15px rgba(255,255,255,0.2));
        }

        .product-title {
            font-size: 1.2rem;
            font-weight: 700;
            margin-bottom: 10px;
        }

        .product-price {
            font-size: 1.1rem;
            font-weight: 300;
            color: #ccc;
        }

        /* ========================
           PRODUCT DETAILS PAGE (SPA)
           ======================== */
        #product-view {
            display: none;
            min-height: 80vh;
            align-items: center;
        }

        .product-details-container {
            display: flex;
            flex-wrap: wrap;
            gap: 50px;
            align-items: center;
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 50px;
        }

        .details-left {
            flex: 1;
            min-width: 300px;
            text-align: center;
        }

        .details-img {
            width: 100%;
            max-width: 400px;
            animation: float 4s ease-in-out infinite;
            filter: drop-shadow(0 0 20px rgba(255,255,255,0.2));
        }

        .details-right {
            flex: 1;
            min-width: 300px;
        }

        .details-title {
            font-size: 2.5rem;
            margin-bottom: 15px;
        }

        .details-desc {
            font-size: 1.1rem;
            font-weight: 300;
            color: #ccc;
            margin-bottom: 30px;
            line-height: 1.6;
        }

        .details-price {
            font-size: 1.8rem;
            font-weight: 700;
            margin-bottom: 30px;
        }

        .controls {
            display: flex;
            gap: 20px;
            align-items: center;
        }

        .qty-input {
            width: 60px;
            padding: 10px;
            background: transparent;
            border: 1px solid var(--white);
            color: var(--white);
            text-align: center;
            font-size: 1.2rem;
            border-radius: 8px;
        }

        .btn-add {
            flex: 1;
            padding: 15px;
            background: var(--white);
            color: var(--black);
            border: none;
            border-radius: 8px;
            font-size: 1.2rem;
            font-weight: 700;
            cursor: pointer;
            transition: var(--transition);
        }

        .btn-add:hover {
            box-shadow: 0 0 20px rgba(255,255,255,0.4);
            transform: translateY(-2px);
        }

        .back-btn {
            display: inline-block;
            margin-bottom: 20px;
            color: #ccc;
            cursor: pointer;
            font-size: 1.1rem;
            transition: var(--transition);
        }
        
        .back-btn:hover {
            color: var(--white);
        }

        /* ========================
           CART & CHECKOUT MODAL
           ======================== */
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(10px);
            z-index: 200;
            display: flex;
            justify-content: flex-end;
            opacity: 0;
            visibility: hidden;
            transition: var(--transition);
        }

        .modal.active {
            opacity: 1;
            visibility: visible;
        }

        .cart-panel {
            width: 100%;
            max-width: 450px;
            height: 100%;
            background: rgba(15, 15, 15, 0.95);
            border-right: 1px solid var(--glass-border);
            padding: 30px;
            transform: translateX(100%);
            transition: transform 0.5s cubic-bezier(0.25, 0.8, 0.25, 1);
            display: flex;
            flex-direction: column;
        }

        .modal.active .cart-panel {
            transform: translateX(0);
        }

        .cart-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            border-bottom: 1px solid var(--glass-border);
            padding-bottom: 15px;
        }

        .close-cart {
            cursor: pointer;
            font-size: 1.5rem;
        }

        .cart-items {
            flex: 1;
            overflow-y: auto;
        }

        .cart-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            background: var(--glass-bg);
            padding: 10px;
            border-radius: 10px;
        }

        .cart-total {
            font-size: 1.5rem;
            font-weight: 700;
            margin: 20px 0;
            border-top: 1px solid var(--glass-border);
            padding-top: 15px;
            text-align: left;
        }

        .checkout-form input {
            width: 100%;
            padding: 12px;
            margin-bottom: 15px;
            background: rgba(255,255,255,0.05);
            border: 1px solid var(--glass-border);
            color: var(--white);
            border-radius: 8px;
            outline: none;
        }

        .checkout-form input:focus {
            border-color: var(--white);
        }

        .payment-info {
            font-size: 0.85rem;
            color: #aaa;
            margin-bottom: 15px;
            text-align: center;
            background: rgba(255,255,255,0.05);
            padding: 10px;
            border-radius: 8px;
        }

        .btn-checkout {
            width: 100%;
            padding: 15px;
            background: var(--white);
            color: var(--black);
            border: none;
            border-radius: 8px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            transition: var(--transition);
        }

        .btn-checkout:hover {
            background: #ccc;
        }

        /* ========================
           ANIMATIONS
           ======================== */
        @keyframes rotate3D {
            0% { transform: perspective(1000px) rotateY(0deg); }
            100% { transform: perspective(1000px) rotateY(360deg); }
        }

        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-15px); }
            100% { transform: translateY(0px); }
        }

        /* ========================
           RESPONSIVE (MOBILE)
           ======================== */
        @media (max-width: 768px) {
            .product-details-container {
                padding: 30px 20px;
            }
            .details-title { font-size: 2rem; }
            .cart-panel { max-width: 100%; border-right: none; }
        }
    </style>
</head>
<body>

    <div class="video-container">
        <div class="overlay"></div>
        <video id="bg-video" autoplay loop muted playsinline>
            <source src="Pin by Yare Mendez on insp _ Trippy visuals_ Dark nature aesthetic_ Film texture(MP4).mp4" type="video/mp4">
        </video>
    </div>

    <div id="intro-screen">
        <img src="Picsart_26-04-17_15-18-45-258.png" alt="Logo" class="intro-logo" id="intro-logo-img">
        
        <div class="intro-text">
            <h1 class="intro-title">حوكشه STORE</h1>
            <p class="intro-subtitle">تجربة جديدة لشراء الكتب الخارجية <br> A Premium E-Learning Experience</p>
        </div>
        <button class="enter-btn" onclick="enterStore()">الدخول للمتجر</button>
    </div>

    <div id="app-content">
        <header id="main-header">
            <img src="Picsart_26-04-17_15-18-45-258.png" alt="Logo" class="header-logo" onclick="goHome()">
            
            <div class="cart-icon" onclick="toggleCart()">
                🛒 <span class="cart-count" id="cart-count">0</span>
            </div>
        </header>

        <div class="container" id="home-view">
            <h2 class="section-title">أحدث الإصدارات - New Arrivals</h2>
            <div class="product-grid" id="product-grid">
                </div>
        </div>

        <div class="container" id="product-view">
            <div class="back-btn" onclick="goHome()">➔ العودة للمتجر</div>
            <div class="product-details-container" id="product-details-content">
                </div>
        </div>
    </div>

    <div class="modal" id="cart-modal">
        <div class="cart-panel">
            <div class="cart-header">
                <h2>سلة المشتريات</h2>
                <span class="close-cart" onclick="toggleCart()">✖</span>
            </div>
            
            <div class="cart-items" id="cart-items-container">
                </div>

            <div class="cart-total">
                الإجمالي: <span id="cart-total-price">0</span> ج.م
            </div>

            <div class="checkout-form">
                <input type="text" id="cust-name" placeholder="الاسم بالكامل (Full Name)" required>
                <input type="tel" id="cust-phone" placeholder="رقم الهاتف (Phone Number)" required>
                <input type="text" id="cust-address" placeholder="العنوان بالتفصيل (Full Address)" required>
                
                <div class="payment-info">
                    💳 نظام الدفع: فودافون كاش<br>
                    (سيتم تحويلك للواتساب لإتمام الطلب وتأكيد التحويل)
                </div>

                <button class="btn-checkout" onclick="checkout()">تأكيد الطلب عبر واتساب</button>
            </div>
        </div>
    </div>

    <script>
        /* ========================
           إعدادات المتجر الأساسية
           ======================== */
        
        // ⬇️ ضَعْ رقم الواتساب الخاص بك هنا (مع كود الدولة، مثال لمصر: 201012345678) ⬇️
        const WHATSAPP_NUMBER = "201000000000"; 

        // بيانات المنتجات (الكتب الخارجية)
        // ⬇️ يمكنك تغيير تفاصيل الكتب والصور من هنا ⬇️
        const products = [
            {
                id: 1,
                name: "كتاب الفيزياء المتقدمة - 3 ثانوي",
                price: 250,
                desc: "كتاب شامل يغطي كافة أجزاء المنهج بأسلوب حديث، مدعوم بأسئلة النظام الجديد والتفكير العميق. نسخة فاخرة.",
                image: "https://cdn-icons-png.flaticon.com/512/2232/2232688.png" // رابط صورة الكتاب
            },
            {
                id: 2,
                name: "الرياضيات البحتة - Premium Edition",
                price: 220,
                desc: "أقوى بنك أسئلة وتدريبات في الرياضيات البحتة، مصمم خصيصاً للطلاب المتميزين الباحثين عن الدرجات النهائية.",
                image: "https://cdn-icons-png.flaticon.com/512/3389/3389081.png"
            },
            {
                id: 3,
                name: "الكيمياء العضوية - الملخص الذهبي",
                price: 190,
                desc: "شرح مبسط وخرائط ذهنية ذكية للكيمياء العضوية، يجعلك تستوعب التفاعلات المعقدة بكل سهولة وسلاسة.",
                image: "https://cdn-icons-png.flaticon.com/512/1046/1046269.png"
            },
            {
                id: 4,
                name: "اللغة العربية - النحو والبلاغة",
                price: 210,
                desc: "موسوعة النحو والبلاغة، تطبيق عملي على نصوص متحررة مطابقة لأحدث مواصفات الامتحانات.",
                image: "https://cdn-icons-png.flaticon.com/512/2232/2232688.png"
            },
            {
                id: 5,
                name: "English Masterclass - Vocab & Grammar",
                price: 240,
                desc: "دليل شامل لاحتراف اللغة الإنجليزية للمرحلة الثانوية، يحتوي على تدريبات مكثفة على القواعد والمفردات.",
                image: "https://cdn-icons-png.flaticon.com/512/3389/3389081.png"
            },
            {
                id: 6,
                name: "الأحياء 3D - الجيولوجيا الحديثة",
                price: 260,
                desc: "كتاب تفاعلي يحتوي على رسومات عالية الدقة لشرح المناهج العلمية بطريقة سينمائية تقترب من الواقع.",
                image: "https://cdn-icons-png.flaticon.com/512/1046/1046269.png"
            }
        ];

        let cart = [];
        let currentProduct = null;

        /* ========================
           تأثيرات الواجهة (Intro & Scroll)
           ======================== */
        function enterStore() {
            document.getElementById('intro-screen').style.opacity = '0';
            setTimeout(() => {
                document.getElementById('intro-screen').style.visibility = 'hidden';
                document.getElementById('app-content').classList.add('active');
            }, 1000);
        }

        window.addEventListener('scroll', () => {
            const header = document.getElementById('main-header');
            if (window.scrollY > 50) {
                header.classList.add('scrolled');
            } else {
                header.classList.remove('scrolled');
            }
        });

        /* ========================
           عرض المنتجات (Render)
           ======================== */
        function renderProducts() {
            const grid = document.getElementById('product-grid');
            grid.innerHTML = '';
            
            products.forEach((prod, index) => {
                const card = document.createElement('div');
                card.className = 'product-card';
                card.style.setProperty('--delay', index);
                card.onclick = () => openProduct(prod.id);
                
                card.innerHTML = `
                    <img src="${prod.image}" alt="${prod.name}" class="product-img">
                    <h3 class="product-title">${prod.name}</h3>
                    <p class="product-price">${prod.price} EGP</p>
                `;
                grid.appendChild(card);
            });
        }

        /* ========================
           نظام التنقل (SPA & History API)
           ======================== */
        function openProduct(id) {
            currentProduct = products.find(p => p.id === id);
            
            document.getElementById('home-view').style.display = 'none';
            document.getElementById('product-view').style.display = 'flex';
            
            const content = document.getElementById('product-details-content');
            content.innerHTML = `
                <div class="details-left">
                    <img src="${currentProduct.image}" class="details-img" alt="${currentProduct.name}">
                </div>
                <div class="details-right">
                    <h1 class="details-title">${currentProduct.name}</h1>
                    <p class="details-desc">${currentProduct.desc}</p>
                    <div class="details-price">${currentProduct.price} EGP</div>
                    <div class="controls">
                        <input type="number" id="qty-input" class="qty-input" value="1" min="1">
                        <button class="btn-add" onclick="addToCart()">إضافة للسلة 🛒</button>
                    </div>
                </div>
            `;
            
            // تغيير الرابط بدون ريلود
            window.history.pushState({page: 'product', id: id}, '', `#product-${id}`);
            window.scrollTo(0,0);
        }

        function goHome() {
            document.getElementById('product-view').style.display = 'none';
            document.getElementById('home-view').style.display = 'block';
            window.history.pushState({page: 'home'}, '', window.location.pathname);
            window.scrollTo(0,0);
        }

        // التعامل مع زر العودة في الموبايل أو المتصفح
        window.addEventListener('popstate', (e) => {
            if (e.state && e.state.page === 'product') {
                openProduct(e.state.id);
            } else {
                goHome();
            }
        });

        /* ========================
           نظام سلة المشتريات (Cart)
           ======================== */
        function toggleCart() {
            const modal = document.getElementById('cart-modal');
            modal.classList.toggle('active');
        }

        function addToCart() {
            const qty = parseInt(document.getElementById('qty-input').value) || 1;
            
            const existingItem = cart.find(item => item.id === currentProduct.id);
            if (existingItem) {
                existingItem.qty += qty;
            } else {
                cart.push({ ...currentProduct, qty: qty });
            }
            
            updateCartUI();
            
            // مؤثر بصري خفيف للتأكيد
            const btn = document.querySelector('.btn-add');
            btn.innerHTML = "تمت الإضافة ✔";
            btn.style.background = "#4CAF50";
            btn.style.color = "#fff";
            setTimeout(() => {
                btn.innerHTML = "إضافة للسلة 🛒";
                btn.style.background = "var(--white)";
                btn.style.color = "var(--black)";
            }, 1500);
        }

        function updateCartUI() {
            // تحديث العدد
            const totalItems = cart.reduce((sum, item) => sum + item.qty, 0);
            document.getElementById('cart-count').innerText = totalItems;
            
            // تحديث القائمة
            const container = document.getElementById('cart-items-container');
            container.innerHTML = '';
            
            let totalPrice = 0;
            
            cart.forEach((item, index) => {
                totalPrice += (item.price * item.qty);
                container.innerHTML += `
                    <div class="cart-item">
                        <div>
                            <strong>${item.name}</strong>
                            <br>
                            <small>${item.price} ج.م x ${item.qty}</small>
                        </div>
                        <span style="cursor:pointer; color:#ff4444;" onclick="removeFromCart(${index})">🗑</span>
                    </div>
                `;
            });
            
            document.getElementById('cart-total-price').innerText = totalPrice;
        }

        function removeFromCart(index) {
            cart.splice(index, 1);
            updateCartUI();
        }

        /* ========================
           نظام إرسال الطلب (WhatsApp Checkout)
           ======================== */
        function checkout() {
            if (cart.length === 0) {
                alert("السلة فارغة!");
                return;
            }

            const name = document.getElementById('cust-name').value.trim();
            const phone = document.getElementById('cust-phone').value.trim();
            const address = document.getElementById('cust-address').value.trim();

            if (!name || !phone || !address) {
                alert("يرجى ملء جميع البيانات (الاسم، الهاتف، العنوان) لإتمام الطلب.");
                return;
            }

            let message = `*طلب جديد من حوكشه STORE* 🛒\n\n`;
            message += `*البيانات الشخصية:*\n`;
            message += `👤 الاسم: ${name}\n`;
            message += `📱 الهاتف: ${phone}\n`;
            message += `📍 العنوان: ${address}\n\n`;
            
            message += `*تفاصيل الطلب:*\n`;
            let total = 0;
            cart.forEach(item => {
                message += `▪️ ${item.name} (الكمية: ${item.qty}) - ${item.price * item.qty} ج.م\n`;
                total += (item.price * item.qty);
            });
            
            message += `\n💰 *الإجمالي:* ${total} ج.م\n`;
            message += `💳 *طريقة الدفع:* فودافون كاش\n`;
            message += `\n(أرجو تأكيد الطلب وإرسال رقم المحفظة للتحويل)`;

            const encodedMessage = encodeURIComponent(message);
            const whatsappURL = `https://wa.me/${201023708424}?text=${encodedMessage}`;
            
            window.open(whatsappURL, '_blank');
        }

        // تهيئة الموقع عند التحميل
        window.onload = () => {
            renderProducts();
            // تهيئة حالة الـ History للرجوع
            window.history.replaceState({page: 'home'}, '', window.location.pathname);
        };
    </script>
</body>
</html>
