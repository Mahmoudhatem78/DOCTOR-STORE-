<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DOCTOR STORE</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap');

:root{
    --main:#fff;
    --bg:#000;
}

body{
    margin:0;
    font-family:'Cairo',sans-serif;
    background:var(--bg);
    color:var(--main);
    overflow-x:hidden;
}

/* فيديو الخلفية */
video.bg{
    position:fixed;
    width:100%;
    height:100%;
    object-fit:cover;
    z-index:-2;
    opacity:0.2;
}

/* طبقة سوداء */
.overlay{
    position:fixed;
    width:100%;
    height:100%;
    background:#000;
    opacity:0.7;
    z-index:-1;
}

/* الهيدر */
.header{
    position:fixed;
    top:0;
    width:100%;
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:10px 20px;
    background:rgba(0,0,0,0.7);
    backdrop-filter:blur(10px);
    z-index:1000;
}

/* اللوجو */
.logo{
    width:60px;
    animation:spin 6s linear infinite;
}

/* مكان تحط اللوجو */
.logo img{
    width:100%;
}

/* دوران 360 */
@keyframes spin{
    0%{transform:rotateY(0deg);}
    100%{transform:rotateY(360deg);}
}

/* اسم الموقع */
.title{
    font-size:20px;
    font-weight:bold;
}

/* المنتجات */
.products{
    margin-top:100px;
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
    gap:20px;
    padding:20px;
}

/* كارت المنتج */
.card{
    background:#111;
    padding:15px;
    border-radius:15px;
    text-align:center;
    transition:0.4s;
    position:relative;
    overflow:hidden;
}

.card:hover{
    transform:translateY(-10px) scale(1.05);
    box-shadow:0 0 20px white;
}

/* حركة ديناميكية */
.card::before{
    content:"";
    position:absolute;
    width:200%;
    height:200%;
    background:linear-gradient(45deg,transparent,white,transparent);
    animation:move 3s linear infinite;
    opacity:0.1;
}

@keyframes move{
    0%{transform:translate(-50%,-50%) rotate(0deg);}
    100%{transform:translate(-50%,-50%) rotate(360deg);}
}

.card img{
    width:100%;
    height:200px;
    object-fit:contain;
}

.btn{
    margin-top:10px;
    padding:10px;
    border:none;
    background:white;
    color:black;
    cursor:pointer;
    font-weight:bold;
}

/* تفاصيل المنتج */
.detail{
    display:none;
    padding:20px;
}

.detail img{
    width:300px;
    display:block;
    margin:auto;
    filter:drop-shadow(0 0 20px white);
}

/* الكارت */
.cart{
    position:fixed;
    right:10px;
    bottom:10px;
    background:white;
    color:black;
    padding:10px;
    border-radius:10px;
    cursor:pointer;
}
</style>
</head>

<body>

<!-- مكان فيديو الخلفية -->
<video class="bg" autoplay muted loop>
    <source src="Pin by Yare Mendez on insp _ Trippy visuals_ Dark nature aesthetic_ Film texture(MP4).mp4">
</video>

<div class="overlay"></div>

<div class="header">
    <div class="logo">
        <!-- حط هنا رابط اللوجو -->
        <img src="Picsart_26-04-17_15-18-45-258.png">
    </div>
    <div class="title">DOCTOR STORE</div>
</div>

<!-- المنتجات -->
<div class="products" id="products"></div>

<!-- تفاصيل -->
<div class="detail" id="detail"></div>

<!-- سلة -->
<div class="cart" onclick="openCart()">🛒 Cart</div>

<script>

const products=[
{ id:1,name:"Biology Book",price:150,img:"https://placehold.co/300x300" },
{ id:2,name:"Chemistry Book",price:200,img:"https://placehold.co/300x300" },
{ id:3,name:"Physics Book",price:180,img:"https://placehold.co/300x300" },
{ id:4,name:"Math Book",price:170,img:"https://placehold.co/300x300" },
{ id:5,name:"English Book",price:140,img:"https://placehold.co/300x300" },
{ id:6,name:"History Book",price:160,img:"https://placehold.co/300x300" }
];

let cart=[];

const container=document.getElementById("products");

products.forEach(p=>{
    container.innerHTML+=`
    <div class="card" onclick="openProduct(${p.id})">
        <img src="${p.img}">
        <h3>${p.name}</h3>
        <p>${p.price} EGP</p>
        <button class="btn">عرض</button>
    </div>
    `;
});

function openProduct(id){
    const p=products.find(x=>x.id==id);
    document.getElementById("products").style.display="none";

    document.getElementById("detail").style.display="block";
    document.getElementById("detail").innerHTML=`
        <button onclick="goBack()">رجوع</button>
        <img src="${p.img}">
        <h2>${p.name}</h2>
        <p>${p.price} جنيه</p>
        <button class="btn" onclick="addToCart('${p.name}')">اضف للسلة</button>
        <button class="btn" onclick="orderNow('${p.name}',${p.price})">اطلب الآن</button>
    `;
}

function goBack(){
    document.getElementById("products").style.display="grid";
    document.getElementById("detail").style.display="none";
}

function addToCart(name){
    cart.push(name);
    alert("تم الاضافة للسلة");
}

function openCart(){
    alert(cart.join("\n"));
}

/* طلب (فوري + واتساب) */
function orderNow(name,price){
    let userName=prompt("اكتب اسمك");
    let phone=prompt("رقمك");
    let location=prompt("موقعك");

    let msg=`طلب جديد:
الاسم: ${userName}
رقم: ${phone}
الموقع: ${location}
المنتج: ${name}
السعر: ${price}`;

    window.open(`https://wa.me/201023708424?text=${encodeURIComponent(msg)}`);
}

/* زر الرجوع */
window.onpopstate=()=>{
    goBack();
}

</script>

</body>
</html>
