<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>حوكشه استور| Premium Education</title>
    <!-- خطوط احترافية من جوجل -->
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&family=Tajawal:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-black: #050505;
            --text-white: #ffffff;
            --glass-bg: rgba(15, 15, 15, 0.65);
            --glass-border: rgba(255, 255, 255, 0.1);
            --glow-color: rgba(255, 255, 255, 0.8);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
        }

        body, html {
            width: 100%;
            height: 100%;
            background-color: var(--bg-black);
            font-family: 'Tajawal', sans-serif;
            color: var(--text-white);
            overflow-x: hidden;
            scroll-behavior: smooth;
        }

        /* --- خلفية الفيديو --- */
        .video-background {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            object-fit: cover;
            z-index: -2;
            opacity: 1; /* تعتيم الفيديو ليكون مريح للعين */
            pointer-events: none;
        }

        /* --- الهيدر الثابت (اللوجو والسلة) --- */
        .header {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            padding: 10px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(15px);
            border-bottom: 1px solid var(--glass-border);
            z-index: 999;
            transition: all 0.3s ease;
        }

        /* اللوجو 3D يلف 360 درجة */
        .logo-wrapper {
            perspective: 800px;
        }
        
        .logo {
            width: 65px;
            height: 65px;
            object-fit: contain;
            animation: rotate3D 6s linear infinite;
            filter: drop-shadow(0 0 15px rgba(255, 255, 255, 0.5));
        }

        @keyframes rotate3D {
            0% { transform: rotateY(0deg); }
            100% { transform: rotateY(360deg); }
        }

        .brand-name {
            font-family: 'Cairo', sans-serif;
            font-size: 1.8rem;
            font-weight: 900;
            letter-spacing: 3px;
            text-shadow: 0 0 10px rgba(255,255,255,0.4);
            cursor: pointer;
        }

        .cart-btn {
            position: relative;
            cursor: pointer;
            font-size: 1.8rem;
            transition: 0.3s;
        }
        .cart-btn:hover { transform: scale(1.1); text-shadow: 0 0 15px white; }
        
        .cart-badge {
            position: absolute;
            top: -5px;
            right: -10px;
            background: white;
            color: black;
            font-size: 0.8rem;
            font-weight: bold;
            border-radius: 50%;
            width: 22px;
            height: 22px;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 0 10px white;
        }

        /* --- إدارة الصفحات --- */
        .page {
            display: none;
            padding: 120px 20px 60px; /* المسافة العلوية بسبب الهيدر الثابت */
            min-height: 100vh;
            flex-direction: column;
            align-items: center;
            animation: fadeIn 0.5s ease-out;
        }
        .page.active { display: flex; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* --- قسم الترحيب --- */
        .hero {
            text-align: center;
            margin-bottom: 50px;
            z-index: 10;
        }
        .hero h1 {
            font-family: 'Cairo', sans-serif;
            font-size: 3rem;
            text-shadow: 0 0 20px rgba(255,255,255,0.6);
            margin-bottom: 15px;
        }
        .hero p {
            font-size: 1.2rem;
            color: #dcdcdc;
            max-width: 600px;
            margin: 0 auto;
            line-height: 1.6;
        }

        /* --- شبكة المنتجات (الحركة الديناميكية) --- */
        .products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 40px;
            width: 100%;
            max-width: 1100px;
        }

        .product-card {
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 25px;
            text-align: center;
            cursor: pointer;
            backdrop-filter: blur(10px);
            transition: 0.4s;
            /* حركة ديناميكية وهو ثابت */
            animation: floatProduct 4s ease-in-out infinite alternate;
        }

        @keyframes floatProduct {
            0% { transform: translateY(0); box-shadow: 0 5px 15px rgba(0,0,0,0.5); }
            100% { transform: translateY(-10px); box-shadow: 0 15px 25px rgba(0,0,0,0.5); }
        }

        .product-card:hover {
            border-color: white;
            box-shadow: 0 0 30px rgba(255, 255, 255, 0.2);
            animation-play-state: paused;
            transform: scale(1.03);
        }

        .product-img {
            width: 100%;
            height: 250px;
            object-fit: contain;
            margin-bottom: 15px;
            transition: 0.4s;
            filter: drop-shadow(0 5px 10px rgba(255,255,255,0.1));
        }

        .product-card:hover .product-img {
            filter: drop-shadow(0 0 25px white);
        }

        .product-name { font-size: 1.4rem; font-weight: bold; margin-bottom: 10px; }
        .product-price { font-size: 1.2rem; color: #bbb; }

        /* --- صفحة تفاصيل المنتج (صورة متوهجة) --- */
        .details-wrapper {
            display: flex;
            flex-wrap: wrap;
            gap: 50px;
            max-width: 1000px;
            width: 100%;
            background: var(--glass-bg);
            padding: 50px;
            border-radius: 30px;
            border: 1px solid var(--glass-border);
            backdrop-filter: blur(20px);
        }

        .glow-img-container {
            flex: 1;
            min-width: 300px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* التوهج القوي للمنتج */
        .details-img {
            width: 100%;
            max-width: 350px;
            object-fit: contain;
            animation: superGlow 2s infinite alternate;
        }

        @keyframes superGlow {
            0% { filter: drop-shadow(0 0 20px rgba(255,255,255,0.5)); transform: scale(1); }
            100% { filter: drop-shadow(0 0 50px rgba(255,255,255,1)); transform: scale(1.05); }
        }

        .details-info {
            flex: 1;
            min-width: 300px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            gap: 20px;
        }

        .details-info h2 { font-family: 'Cairo'; font-size: 2.5rem; text-shadow: 0 0 15px white; }
        .details-info .price { font-size: 2rem; font-weight: bold; }
        .details-info p { color: #ccc; line-height: 1.8; font-size: 1.1rem; }

        .btn {
            padding: 15px 25px;
            border: none;
            border-radius: 12px;
            font-size: 1.2rem;
            font-family: 'Tajawal', sans-serif;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }
        .btn-primary {
            background: white; color: black;
            box-shadow: 0 0 20px rgba(255,255,255,0.4);
        }
        .btn-primary:hover {
            background: #e0e0e0; transform: scale(1.05); box-shadow: 0 0 35px white;
        }
        .btn-secondary {
            background: transparent; color: white; border: 2px solid white;
        }
        .btn-secondary:hover { background: rgba(255,255,255,0.1); }

        /* --- صفحة السلة ونموذج فوري --- */
        .cart-container {
            max-width: 800px; width: 100%;
        }
        .cart-item {
            display: flex; justify-content: space-between; align-items: center;
            background: rgba(255,255,255,0.05); padding: 15px; border-radius: 15px;
            margin-bottom: 15px; border: 1px solid var(--glass-border);
        }
        .fawry-form {
            background: rgba(0,0,0,0.6); padding: 30px; border-radius: 20px;
            border: 1px solid var(--glass-border); margin-top: 30px;
            display: flex; flex-direction: column; gap: 15px;
        }
        .fawry-form input, .fawry-form textarea {
            width: 100%; padding: 15px; background: rgba(255,255,255,0.05);
            border: 1px solid #555; color: white; border-radius: 10px; font-family: 'Tajawal';
        }
        .fawry-form input:focus, .fawry-form textarea:focus {
            outline: none; border-color: white; box-shadow: 0 0 15px rgba(255,255,255,0.2);
        }

        .back-btn {
            align-self: flex-start; margin-bottom: 20px; font-size: 1.2rem;
            cursor: pointer; color: #aaa; transition: 0.3s;
        }
        .back-btn:hover { color: white; text-shadow: 0 0 10px white; }

    </style>
</head>
<body>

    <!-- فيديو الخلفية (تمت إضافة الخصائص ليعمل على كل الأجهزة) -->
    <video autoplay loop muted playsinline class="video-background">
        <source src="Pin by Yare Mendez on insp _ Trippy visuals_ Dark nature aesthetic_ Film texture(MP4).mp4" type="video/mp4">
    </video>

    <!-- الهيدر الثابت -->
    <header class="header">
        <div class="logo-wrapper" onclick="nav('home')">
            <!-- اللوجو الخاص بك 3D -->
            <img src="Picsart_26-04-17_15-18-45-258.png" alt="Doctor Store Logo" class="logo">
        </div>
        <div class="brand-name" onclick="nav('home')">DOCTOR STORE</div>
        <div class="cart-btn" onclick="nav('cart')">
            🛒 <span class="cart-badge" id="cartCount">0</span>
        </div>
    </header>

    <!-- الصفحة الرئيسية: المنتجات -->
    <main id="home" class="page active">
        <div class="hero">
            <h1>عالم الكتب الخارجية</h1>
            <p>مرحباً بك في حوكشه استور ، المنصة الأقوى للكتب التعليمية. اختر موادك واستعد للتفوق باحترافية.</p>
        </div>
        <!-- 6 منتجات كما طلبت -->
        <div class="products-grid" id="productsGrid"></div>
    </main>

    <!-- صفحة تفاصيل المنتج -->
    <section id="product" class="page">
        <div class="back-btn" onclick="history.back()">⟵ عودة للمتجر</div>
        <div class="details-wrapper" id="productDetails"></div>
    </section>

    <!-- صفحة السلة والدفع -->
    <section id="cart" class="page">
        <div class="cart-container">
            <div class="back-btn" onclick="history.back()">⟵ عودة</div>
            <h2 style="font-family:'Cairo'; text-shadow:0 0 10px white; margin-bottom:20px;">سلة المشتريات 🛒</h2>
            
            <div id="cartItems"></div>
            <h3 style="margin-top:20px; font-size:1.5rem;">الإجمالي: <span id="totalPrice">0</span> ج.م</h3>

            <!-- نموذج الدفع بفوري -->
            <div class="fawry-form" id="fawryForm" style="display:none;">
                <h3 style="color:white;">الدفع عبر فوري (Fawry Pay) ⚡</h3>
                <p style="color:#aaa; font-size:0.9rem;">أدخل بياناتك ليتم إرسال طلبك واستلام كود فوري للدفع عبر الواتساب.</p>
                
                <input type="text" id="uName" placeholder="الاسم بالكامل" required>
                <input type="tel" id="uPhone" placeholder="رقم الموبايل (واتساب)" required>
                <textarea id="uAddress" rows="3" placeholder="المحافظة - تفاصيل العنوان" required></textarea>
                
                <button class="btn btn-primary" onclick="checkoutFawry()">تأكيد الطلب واستلام الكود</button>
            </div>
        </div>
    </section>

    <script>
        // ==========================================
        // 1. بيانات الكتب الـ 6
        // ==========================================
        const productsData = [
            { id: 1, name: "كتاب الكيمياء العضوية", price: 350, img: "https://placehold.co/400x500/111/fff?text=Chemistry", desc: "أفضل كتاب مراجعة شاملة لأسئلة الكيمياء العضوية بنظام التابلت." },
            { id: 2, name: "الفيزياء الحديثة VIP", price: 320, img: "https://placehold.co/400x500/111/fff?text=Physics", desc: "شرح مبسط وأكثر من 2000 سؤال محلول في الفيزياء الحديثة." },
            { id: 3, name: "الأحياء الشامل", price: 290, img: "https://placehold.co/400x500/111/fff?text=Biology", desc: "كتاب الدوافع والتكاثر والمناعة بأسلوب دكتور ستور الحصري." },
            { id: 4, name: "بنك النحو العربي", price: 250, img: "https://placehold.co/400x500/111/fff?text=Arabic", desc: "تجميعة امتحانات الثانوية العامة وأفكار النحو المتوقعة." },
            { id: 5, name: "الرياضيات البحتة", price: 310, img: "https://placehold.co/400x500/111/fff?text=Math", desc: "مذكرة التفاضل والتكامل والهندسة الفراغية لطلاب علمي رياضة." },
            { id: 6, name: "English Master", price: 280, img: "https://placehold.co/400x500/111/fff?text=English", desc: "قاموس كلمات المنهج وقطع الفهم والترجمة الاحترافية." }
        ];

        const myWhatsappNumber = "201023708424"; // ضع رقمك هنا مسبوقاً بكود الدولة

        let cart = [];

        // ==========================================
        // 2. نظام التنقل وزر الرجوع (History API)
        // ==========================================
        window.onload = () => {
            history.replaceState({ page: 'home' }, "", "#home");
            buildGrid();
        };

        window.onpopstate = (e) => {
            if (e.state && e.state.page) showPage(e.state.page);
            else showPage('home');
        };

        function nav(pageId) {
            history.pushState({ page: pageId }, "", "#" + pageId);
            showPage(pageId);
        }

        function showPage(pageId) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(pageId).classList.add('active');
            window.scrollTo(0, 0);
            if(pageId === 'cart') updateCartUI();
        }

        // ==========================================
        // 3. بناء شبكة المنتجات وتفاصيل المنتج
        // ==========================================
        function buildGrid() {
            const grid = document.getElementById('productsGrid');
            productsData.forEach(p => {
                grid.innerHTML += `
                    <div class="product-card" onclick="openProduct(${p.id})">
                        <img src="${p.img}" class="product-img">
                        <div class="product-name">${p.name}</div>
                        <div class="product-price">${p.price} EGP</div>
                    </div>
                `;
            });
        }

        function openProduct(id) {
            const p = productsData.find(x => x.id === id);
            document.getElementById('productDetails').innerHTML = `
                <div class="glow-img-container">
                    <img src="${p.img}" class="details-img">
                </div>
                <div class="details-info">
                    <h2>${p.name}</h2>
                    <div class="price">${p.price} ج.م</div>
                    <p>${p.desc}</p>
                    <div style="display:flex; gap:15px; margin-top:20px;">
                        <button class="btn btn-primary" style="flex:2;" onclick="addToCart(${p.id}, true)">اشتري الآن (فوري)</button>
                        <button class="btn btn-secondary" style="flex:1;" onclick="addToCart(${p.id})">أضف للسلة</button>
                    </div>
                </div>
            `;
            nav('product');
        }

        // ==========================================
        // 4. السلة والدفع عبر فوري (واتساب)
        // ==========================================
        function addToCart(id, goToCart = false) {
            const product = productsData.find(x => x.id === id);
            const exist = cart.find(x => x.id === id);
            if(exist) exist.qty++; else cart.push({...product, qty:1});
            
            document.getElementById('cartCount').innerText = cart.reduce((a,b)=>a+b.qty,0);
            
            if(goToCart) {
                nav('cart');
            } else {
                const btn = event.target;
                btn.innerText = "تمت الإضافة ✔";
                btn.style.background = "#fff"; btn.style.color = "#000";
                setTimeout(() => {
                    btn.innerText = "أضف للسلة";
                    btn.style.background = "transparent"; btn.style.color = "#fff";
                }, 1000);
            }
        }

        function updateCartUI() {
            const container = document.getElementById('cartItems');
            const form = document.getElementById('fawryForm');
            container.innerHTML = '';
            let total = 0;

            if(cart.length === 0) {
                container.innerHTML = '<p style="text-align:center; color:#888;">السلة فارغة</p>';
                document.getElementById('totalPrice').innerText = '0';
                form.style.display = 'none';
                return;
            }

            cart.forEach((item, index) => {
                total += item.price * item.qty;
                container.innerHTML += `
                    <div class="cart-item">
                        <div style="display:flex; gap:15px; align-items:center;">
                            <img src="${item.img}" style="width:60px; height:60px; object-fit:contain;">
                            <div>
                                <div style="font-weight:bold; font-size:1.1rem;">${item.name}</div>
                                <div style="color:#aaa;">الكمية: ${item.qty} | ${item.price} ج.م</div>
                            </div>
                        </div>
                        <button onclick="removeCartItem(${index})" style="background:none; border:none; color:#ff4444; font-size:1.8rem; cursor:pointer;">&times;</button>
                    </div>
                `;
            });
            document.getElementById('totalPrice').innerText = total;
            form.style.display = 'flex';
        }

        function removeCartItem(index) {
            cart.splice(index, 1);
            document.getElementById('cartCount').innerText = cart.reduce((a,b)=>a+b.qty,0);
            updateCartUI();
        }

        function checkoutFawry() {
            const name = document.getElementById('uName').value;
            const phone = document.getElementById('uPhone').value;
            const address = document.getElementById('uAddress').value;

            if(!name || !phone || !address) {
                alert("يرجى ملء جميع البيانات لإنشاء كود فوري.");
                return;
            }

            let orderText = cart.map(i => `▪ ${i.name} (كمية: ${i.qty})`).join('%0A');
            let total = cart.reduce((a,b) => a + (b.price * b.qty), 0);

            let msg = `*طلب دفع جديد عبر فوري - DOCTOR STORE* ⚡%0A%0A` +
                      `*بيانات الطالب:*%0A` +
                      `👤 الاسم: ${name}%0A` +
                      `📱 الرقم: ${phone}%0A` +
                      `📍 العنوان: ${address}%0A` +
                      `-------------------%0A` +
                      `*المنتجات المطلوبة:*%0A${orderText}%0A%0A` +
                      `*الإجمالي:* ${total} ج.م%0A` +
                      `-------------------%0A` +
                      `برجاء إرسال كود فوري للدفع.`;

            window.open(`https://wa.me/${myWhatsappNumber}?text=${msg}`, '_blank');
            
            cart = [];
            document.getElementById('cartCount').innerText = '0';
            updateCartUI();
            document.getElementById('uName').value = '';
            document.getElementById('uPhone').value = '';
            document.getElementById('uAddress').value = '';
        }
    </script>
</body>
</html>
