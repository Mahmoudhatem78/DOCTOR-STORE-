<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>DOCTOR STORE</title>

<style>
body{
    margin:0;
    font-family: Arial;
    background:black;
    color:white;
}

/* ===== الخلفية (حط الرابط بتاعك هنا) ===== */
body::before{
    content:"";
    position:fixed;
    width:100%;
    height:100%;
    background:url("PUT-YOUR-BACKGROUND-HERE") center/cover no-repeat;
    opacity:0.15;
    z-index:-1;
}

/* ===== الهيدر ===== */
header{
    position:fixed;
    top:0;
    width:100%;
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:10px 20px;
    background:rgba(0,0,0,0.7);
    backdrop-filter:blur(10px);
    z-index:999;
}

/* ===== اللوجو ===== */
.logo{
    display:flex;
    align-items:center;
    gap:10px;
}

.logo img{
    width:50px;
    height:50px;
    animation:spin 6s linear infinite;
}

/* حط رابط اللوجو هنا */
.logo img{
    content:url("Picsart_26-04-17_15-18-45-258.png");
}

@keyframes spin{
    from{transform:rotate(0)}
    to{transform:rotate(360deg)}
}

.logo span{
    font-weight:bold;
    letter-spacing:3px;
}

/* ===== عند الاسكرول ===== */
.small{
    transform:scale(0.7);
    position:fixed;
    left:10px;
    top:10px;
}

/* ===== المنتجات ===== */
.container{
    margin-top:100px;
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
    gap:30px;
    padding:20px;
}

.card{
    background:#111;
    padding:20px;
    text-align:center;
    border-radius:15px;
    transition:0.4s;
}

.card:hover{
    transform:translateY(-10px) scale(1.05);
    box-shadow:0 0 20px white;
}

.card img{
    width:100%;
    height:250px;
    object-fit:contain;
    animation:float 3s ease-in-out infinite;
}

@keyframes float{
    0%,100%{transform:translateY(0)}
    50%{transform:translateY(-10px)}
}

/* ===== زر الطلب ===== */
button{
    margin-top:10px;
    padding:10px;
    border:none;
    background:white;
    color:black;
    cursor:pointer;
}

/* ===== الفورم ===== */
.form-box{
    display:none;
    position:fixed;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    background:#111;
    padding:20px;
    border-radius:15px;
    width:300px;
}

input{
    width:100%;
    margin:5px 0;
    padding:8px;
}

</style>
</head>

<body>

<header id="header">
    <div class="logo">
        <img>
        <span>DOCTOR STORE</span>
    </div>
</header>

<!-- المنتجات -->
<div class="container" id="products"></div>

<!-- فورم الطلب -->
<div class="form-box" id="formBox">
    <h3>ادخل بياناتك</h3>
    <input placeholder="اسمك" id="name">
    <input placeholder="رقمك" id="phone">
    <input placeholder="عنوانك" id="address">
    <button onclick="sendOrder()">تأكيد الطلب</button>
</div>

<script>

/* ===== المنتجات (6 كتب) ===== */
const products = [
{ name:"Biology Book", price:150, img:"https://placehold.co/300x300?text=Book1"},
{ name:"Chemistry Book", price:180, img:"https://placehold.co/300x300?text=Book2"},
{ name:"Physics Book", price:200, img:"https://placehold.co/300x300?text=Book3"},
{ name:"Math Book", price:170, img:"https://placehold.co/300x300?text=Book4"},
{ name:"English Book", price:120, img:"https://placehold.co/300x300?text=Book5"},
{ name:"History Book", price:140, img:"https://placehold.co/300x300?text=Book6"}
];

let selectedProduct = "";

/* عرض المنتجات */
const container = document.getElementById("products");

products.forEach(p=>{
    container.innerHTML += `
    <div class="card">
        <img src="${p.img}">
        <h3>${p.name}</h3>
        <p>${p.price} EGP</p>
        <button onclick="order('${p.name}')">اطلب الان</button>
    </div>`;
});

/* فتح الفورم */
function order(name){
    selectedProduct = name;
    document.getElementById("formBox").style.display="block";
}

/* ارسال الطلب */
function sendOrder(){
    let name = document.getElementById("name").value;
    let phone = document.getElementById("phone").value;
    let address = document.getElementById("address").value;

    let msg = `طلب جديد%0Aالمنتج: ${selectedProduct}%0Aالاسم: ${name}%0Aالرقم: ${phone}%0Aالعنوان: ${address}%0Aالدفع: فوري`;

    /* غير الرقم ده برقمك */
    window.open("https://wa.me/201023708424?text="+msg);
}

/* تصغير اللوجو عند الاسكرول */
window.addEventListener("scroll",()=>{
    let header = document.getElementById("header");
    if(window.scrollY > 50){
        header.classList.add("small");
    }else{
        header.classList.remove("small");
    }
});

</script>

</body>
</html>
